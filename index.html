<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kiberxavfsizlik Alifbosi WebAR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #topHelp {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 999;
      color: white;
      padding: 12px;
      border: 1px solid #00d9ff;
      border-radius: 12px;
      background: rgba(0,20,40,.85);
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>
  <div id="topHelp">Posterga kamerani qarating. Agar poster tanilsa, rangli panel chiqadi.</div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; uiScanning: true;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane
        position="0 0 0"
        width="1"
        height="0.35"
        color="#00d9ff"
        opacity="0.85">
      </a-plane>

      <a-text
        value="KIBERXAVFSIZLIK ALIFBOSI AR ISHLADI!"
        position="-0.45 0 0.05"
        width="1"
        color="#000000">
      </a-text>
    </a-entity>
  </a-scene>
</body>
</html>
