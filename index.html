<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiberxavfsizlik Alifbosi WebAR</title>
<link rel="stylesheet" href="./style.css">
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
<div id="topHelp">Posterga kamerani qarating. Rangli nuqtani bosing.</div>
<div id="infoCard"><button id="closeBtn">×</button><div id="letter"></div><h2 id="term"></h2><p id="desc"></p></div>

<a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; uiScanning: yes; videoSettings: { facingMode: 'environment' };"
  color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
  <a-assets><img id="poster" src="./assets/poster.png"></a-assets>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane src="#poster" position="0 0 0" height="1.4" width="1" opacity="0.18"></a-plane>
    <a-circle class="hotspot" data-key="F" position="-0.07 0.37 0.05" radius="0.035" color="#ff3be7"></a-circle>
    <a-circle class="hotspot" data-key="N" position="-0.42 0.02 0.05" radius="0.035" color="#00d9ff"></a-circle>
    <a-circle class="hotspot" data-key="P" position="-0.07 0.02 0.05" radius="0.035" color="#8b5cff"></a-circle>
    <a-circle class="hotspot" data-key="Q" position="0.10 0.02 0.05" radius="0.035" color="#ffd21f"></a-circle>
    <a-circle class="hotspot" data-key="X" position="0.10 -0.31 0.05" radius="0.035" color="#ff3be7"></a-circle>
  </a-entity>
</a-scene>
<script src="./app.js"></script>
</body>
</html>
